services:
  ros_noetic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ros_noetic_sim
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../ros_ws:/ros_ws
    stdin_open: true
    tty: true
    privileged: true
