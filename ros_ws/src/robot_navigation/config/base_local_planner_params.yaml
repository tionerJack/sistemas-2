# Alias para compatibilidad con Navigation Stack
# Los parámetros DWA se cargan desde dwa_local_planner_params.yaml
TrajectoryPlannerROS:
  max_vel_x: 0.55
  min_vel_x: -0.10
  max_vel_theta: 1.0
  min_in_place_vel_theta: 0.5
  acc_lim_x: 2.5
  acc_lim_theta: 3.2
  sim_time: 1.5
  sim_granularity: 0.025
  vx_samples: 6
  vtheta_samples: 20
  pdist_scale: 0.6
  gdist_scale: 0.8
  occdist_scale: 0.01
  heading_lookahead: 0.325
  xy_goal_tolerance: 0.10
  yaw_goal_tolerance: 0.05
  oscillation_reset_dist: 0.05
  meter_scoring: true
