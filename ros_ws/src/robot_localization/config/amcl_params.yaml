# AMCL parameters - Tarea 2: Localización
# Basado en ARCHITECTURE.md §4.1

# Filtro de partículas
min_particles: 500
max_particles: 5000
kld_err: 0.01
kld_z: 0.99
update_min_d: 0.25
update_min_a: 0.2
resample_interval: 1

# Modelo de odometría
odom_model_type: diff
odom_alpha1: 0.2
odom_alpha2: 0.2
odom_alpha3: 0.2
odom_alpha4: 0.2
odom_alpha5: 0.1

# Modelo de sensor
laser_model_type: likelihood_field
laser_z_hit: 0.95
laser_z_rand: 0.05
laser_sigma_hit: 0.2
laser_lambda_short: 0.1
laser_max_beams: 60

# Transformación global
odom_frame_id: odom
base_frame_id: base_link
global_frame_id: map

# Inicialización
initial_pose_x: 0.0
initial_pose_y: 0.0
initial_pose_a: 0.0
initial_cov_xx: 0.5
initial_cov_yy: 0.5
initial_cov_aa: 0.5

# Recuperación de fallos
recovery_alpha_slow: 0.001
recovery_alpha_fast: 0.1
gui_publish_rate: 10.0
save_pose_rate: 0.5
